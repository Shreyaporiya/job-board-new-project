type Post {
    id: ID!
    title: String!
    content: String!
}

type Query {
    posts: [Post!]! @all
}

type Mutation {
    createPost(
        title: String!
        content: String!
    ): Post! @create

    updatePost(
        id: ID!
        title: String!
        content: String!
    ): Post! @update

    deletePost(id: ID! @whereKey): Post @delete
}